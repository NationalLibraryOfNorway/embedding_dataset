[model]
model_id = "google/gemini-3.5-flash"
temperature = 1.0
top_p = 1.0

[server]
# Uses Application Default Credentials via Vertex AI
# Run: gcloud auth application-default login
base_url = "https://aiplatform.googleapis.com/v1/projects/{project_id}/locations/{location}/endpoints/openapi"
project_id = ""  # your GCP project ID
location = "global"
auth = "gcloud"
api_key = ""

[huggingface]
hf_user = "NbAiLab"
push_to_hf = false

[generation]
total_desired_samples = 100
output_dir = "output/vertex_mini"

[datasets]
text_classification_task_dataset_name = "classification-tasks"
retrieval_task_dataset_name = "retrieval-tasks"
text_matching_short_dataset_name = "text-matching-short-tasks"
text_matching_long_dataset_name = "text-matching-long-tasks"
task_dataset_id_unit_triple = "synthetic-from-unit-triple-tasks"
